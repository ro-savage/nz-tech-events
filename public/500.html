<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Internal Server Error - NZ Tech Events</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4C5;</text></svg>">

    <!-- Pico CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.pink.min.css">

    <style>
      body {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .error-content {
        text-align: center;
        max-width: 480px;
        padding: 2rem 1rem;
      }

      .error-code {
        font-size: 5rem;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 0.5rem;
        color: var(--pico-primary);
      }

      .error-content h1 {
        font-size: 1.75rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }

      .error-content p {
        color: var(--pico-muted-color);
        margin-bottom: 1.5rem;
      }

      .site-header {
        padding-top: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--pico-muted-border-color);
      }

      .brand {
        font-weight: 700;
        font-size: 2rem;
        text-decoration: none;
      }

      .site-footer {
        padding-top: 1.5rem;
        padding-bottom: 1.5rem;
        border-top: 1px solid var(--pico-muted-border-color);
        text-align: center;
        color: var(--pico-muted-color);
      }
    </style>
  </head>

  <body>
    <header class="container site-header">
      <nav>
        <ul>
          <li><a href="/" class="brand">NZ Tech Events</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <div class="error-content">
        <div class="error-code">500</div>
        <h1>Internal Server Error</h1>
        <p>Something went wrong on our end. Please try again later.</p>
        <a href="/" role="button">Back to Events</a>
      </div>
    </main>

    <footer class="container site-footer">
      <small>Free. <a href="https://github.com/ro-savage/nz-tech-events">Open Source</a>. No Ads. No Tracking.</small>
    </footer>
  </body>
</html>
