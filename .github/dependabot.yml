version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  groups:
    minor-and-patch:
      update-types: ["minor", "patch"]
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  groups:
    minor-and-patch:
      update-types: ["minor", "patch"]
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  groups:
    minor-and-patch:
      update-types: ["minor", "patch"]
