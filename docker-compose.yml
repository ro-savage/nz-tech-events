services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    environment:
      - RAILS_ENV=development
    command: bin/rails server -b 0.0.0.0

  test:
    build: .
    volumes:
      - .:/rails
    environment:
      - RAILS_ENV=test
    command: bin/rails test
    profiles:
      - test
